# P6 Fix — Hardened PostgreSQL Secret
# Before: stringData field with plaintext POSTGRES_PASSWORD
# After: data field with base64-encoded values
#
# Commands used:
#   kubectl delete secret postgres-secret -n rakie
#   kubectl create secret generic postgres-secret \
#     --from-literal=POSTGRES_USER=rakie \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -base64 16)" \
#     --from-literal=POSTGRES_DB=rakie \
#     -n rakie
#
# Verification:
#   kubectl describe secret postgres-secret -n rakie
#   # Shows: POSTGRES_PASSWORD: 17 bytes (no plaintext)
#
# Evidence: SEC-1 through SEC-5 in CA2 report
#
# IMPORTANT: base64 is encoding, not encryption.
# Production fix: Bitnami Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#
# Replace <base64-value> with: echo -n "your-value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: rakie
  labels:
    security.ca2/applied: "true"
    security.ca2/finding: "P6"
type: Opaque
data:
  POSTGRES_USER:     cmFraWU=        # base64("rakie") — replace with your value
  POSTGRES_PASSWORD: <base64-value>  # echo -n "your-password" | base64
  POSTGRES_DB:       cmFraWU=        # base64("rakie") — replace with your value
